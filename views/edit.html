<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Edit an existing dry fruit product in the store inventory.">
  <title>Edit Product | Dry Fruit Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ── Navbar ─────────────────────────────── -->
  <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
    <div class="container">
      <a class="navbar-brand" href="/">🌰 DryFruit Store</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/products">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="/add">Add Product</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ── Page Header ────────────────────────── -->
  <section class="page-header">
    <div class="container">
      <h1>✏️ Edit Product</h1>
      <p class="mt-2">Update the product details below</p>
    </div>
  </section>

  <!-- ── Edit Form ──────────────────────────── -->
  <section class="form-section">
    <div class="container">
      <div class="form-card">
        <form id="edit-product-form">
          <!-- Product Name -->
          <div class="mb-3">
            <label for="edit-name" class="form-label">Product Name *</label>
            <input type="text" class="form-control" id="edit-name"
                   placeholder="e.g. Almonds, Cashews, Walnuts" required>
          </div>

          <!-- Price -->
          <div class="mb-3">
            <label for="edit-price" class="form-label">Price (Rs.) *</label>
            <input type="number" class="form-control" id="edit-price"
                   placeholder="e.g. 1500" min="0" step="1" required>
          </div>

          <!-- Quantity -->
          <div class="mb-3">
            <label for="edit-quantity" class="form-label">Quantity (kg) *</label>
            <input type="number" class="form-control" id="edit-quantity"
                   placeholder="e.g. 50" min="0" step="1" required>
          </div>

          <!-- Image URL (optional) -->
          <div class="mb-4">
            <label for="edit-image" class="form-label">Image URL (optional)</label>
            <input type="url" class="form-control" id="edit-image"
                   placeholder="https://example.com/image.jpg">
            <small class="text-muted">Leave blank to keep the default image</small>
          </div>

          <!-- Buttons -->
          <button type="submit" class="btn-submit">💾 Update Product</button>
          <a href="/products" class="btn btn-outline-secondary w-100 mt-2"
             style="border-radius:var(--radius-md);padding:0.75rem;">← Back to Products</a>
        </form>
      </div>
    </div>
  </section>

  <!-- ── Footer ─────────────────────────────── -->
  <footer class="footer">
    <div class="container">
      <p>© 2026 Dry Fruit Store Management System | Built with Node.js, Express & MongoDB</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
