<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Browse all dry fruit products in our inventory. View prices, stock levels and manage your products.">
  <title>Products | Dry Fruit Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- ── Navbar ─────────────────────────────── -->
  <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
    <div class="container">
      <a class="navbar-brand" href="/">🌰 DryFruit Store</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="/products">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="/add">Add Product</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ── Page Header ────────────────────────── -->
  <section class="page-header">
    <div class="container">
      <h1>🥜 Our Products</h1>
      <p class="mt-2">Browse and manage your dry fruit inventory</p>
    </div>
  </section>

  <!-- ── Products Grid ──────────────────────── -->
  <section class="products-grid">
    <div class="container">
      <!-- Search Bar -->
      <div class="search-bar-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" class="search-bar" placeholder="Search products by name...">
      </div>

      <!-- Products will be rendered here by JS -->
      <div class="row" id="products-container">
        <div class="col-12 spinner-wrapper">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- ── Delete Confirmation Modal ──────────── -->
  <div class="modal fade modal-custom" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">⚠️ Confirm Delete</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          Are you sure you want to delete <strong id="delete-product-name"></strong>?
          This action cannot be undone.
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" onclick="executeDelete()">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Footer ─────────────────────────────── -->
  <footer class="footer">
    <div class="container">
      <p>© 2026 Dry Fruit Store Management System | Built with Node.js, Express & MongoDB</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
